server:
  port: 8080

spring:
  application:
    name: sentinel-soc
  data:
    mongodb:
      uri: mongodb://sentinelai:sentinelai_secure_2026@localhost:27017/sentinelai_soc?authSource=admin
      database: sentinelai_soc
  graphql:
    graphiql:
      enabled: true
    path: /graphql

# JWT Configuration
jwt:
  secret: SentinelAI_SOC_JWT_Secret_Key_2026_Enterprise_Grade_Security_Platform_256bit
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# AI Service
ai-service:
  base-url: http://localhost:8000/api/v1

# CORS
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.sentinelai: DEBUG
    org.springframework.security: INFO
