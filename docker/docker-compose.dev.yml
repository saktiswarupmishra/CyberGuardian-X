version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: sentinelai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sentinelai
      MONGO_INITDB_ROOT_PASSWORD: sentinelai_secure_2026
      MONGO_INITDB_DATABASE: sentinelai_soc
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
