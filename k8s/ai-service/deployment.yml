apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: sentinelai
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: sentinelai-ai-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: MONGODB_URI
          value: mongodb://sentinelai:sentinelai_secure_2026@mongodb:27017/sentinelai_soc?authSource=admin
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: sentinelai-secrets
              key: gemini-api-key
        resources:
          limits:
            cpu: "1.5"
            memory: 1.5Gi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
